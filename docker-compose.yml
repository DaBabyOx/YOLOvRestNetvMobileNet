services:
  pipeline:
    build:
      context: .
      dockerfile: pipeline/Dockerfile
    volumes:
      - .:/workspace
    working_dir: /workspace
    command: python pipeline/scripts/run_all.py
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    shm_size: "8gb"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
